name = "balux-cronjob-offline"
main = "src/worker_offline_event.js"
compatibility_date = "2026-01-08"

# Cada 1 minuto (detección rápida). Umbral interno: 5 minutos.
triggers = { crons = ["*/5 * * * *"] }

[[d1_databases]]
binding = "DB"
database_name = "balux-database"
database_id = "16b8be5c-cba5-4c22-9401-adc8e3fa5b75"

[[r2_buckets]]
binding = "R2_BUCKET"
bucket_name = "balux-monitor-operativa"
